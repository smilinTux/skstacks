---
# converge.yml — applies the rke2-common role to all test instances.

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    # Provide a stub IP for inventory_hostname → hosts mapping task.
    - name: Set ansible_default_ipv4 stub if missing (container environment)
      ansible.builtin.set_fact:
        ansible_default_ipv4:
          address: "127.0.0.1"
      when: ansible_default_ipv4.address is not defined

  roles:
    - role: rke2-common
