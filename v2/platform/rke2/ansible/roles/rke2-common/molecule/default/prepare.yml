---
# prepare.yml — run once before converge to bootstrap test containers.
# Installs Python (needed by Ansible) and ensures systemd is ready.

- name: Prepare
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Wait for systemd to be ready
      ansible.builtin.command: systemctl is-system-running --wait
      register: systemd_status
      changed_when: false
      failed_when: systemd_status.stdout not in ["running", "degraded"]
      timeout: 30

    - name: Install Python3 (Debian/Ubuntu — needed before gather_facts)
      ansible.builtin.raw: |
        apt-get update -qq && apt-get install -y python3 python3-apt
      changed_when: true
      when: ansible_os_family is not defined or ansible_os_family == "Debian"

    - name: Install Python3 (RHEL/Rocky — needed before gather_facts)
      ansible.builtin.raw: |
        dnf install -y python3
      changed_when: true
      when: ansible_os_family is defined and ansible_os_family == "RedHat"
