---
# Molecule scenario: default
# Tests the rke2-common role against Ubuntu 22.04 and Rocky Linux 8.
#
# Requires privileged containers to exercise sysctl/kernel-module tasks.
# Set MOLECULE_DISTRO env to select platform (used by CI matrix).

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml   # role-relative path

driver:
  name: docker

platforms:
  - name: rke2-common-ubuntu2204
    image: "geerlingguy/docker-ubuntu2204-ansible:latest"
    cgroupns_mode: host
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    pre_build_image: true
    groups:
      - all_nodes

  - name: rke2-common-rockylinux8
    image: "geerlingguy/docker-rockylinux8-ansible:latest"
    cgroupns_mode: host
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /usr/lib/systemd/systemd
    pre_build_image: true
    groups:
      - all_nodes

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  config_options:
    defaults:
      callbacks_enabled: profile_tasks

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint --strict
