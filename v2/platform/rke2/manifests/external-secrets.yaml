# External Secrets Operator — secret backend bridge for K8s
# Auto-deployed by RKE2 from /var/lib/rancher/rke2/server/manifests/
#
# After install, configure a ClusterSecretStore in overlays/{env}/ pointing
# to your chosen secret backend (vault-file, hashicorp-vault, or capauth).

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: external-secrets
  namespace: kube-system
spec:
  repo: https://charts.external-secrets.io
  chart: external-secrets
  version: "0.9.16"
  targetNamespace: external-secrets
  createNamespace: true
  valuesContent: |-
    installCRDs: true
    replicaCount: 2

    resources:
      requests:
        memory: 64Mi
        cpu: 10m
      limits:
        memory: 256Mi
        cpu: 100m

    webhook:
      replicaCount: 2

    certController:
      replicaCount: 2

    serviceMonitor:
      enabled: true
