---
# MetalLB IPAddressPool — addresses are overridden in each overlay.
# Requires MetalLB >= 0.13 (CRD-based config, not ConfigMap).
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.200-192.168.1.250   # placeholder — override in overlay
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool
