---
# cert-manager ClusterIssuer — server URL and email are overridden per overlay.
# dev uses acme-staging to avoid rate limits; staging/prod use acme-v02.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@CHANGEME_DOMAIN
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
