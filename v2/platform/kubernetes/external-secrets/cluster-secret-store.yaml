# ClusterSecretStore — HashiCorp Vault KV-v2
# coord task: 55d31c18
#
# KV path convention (all three levels required):
#   secrets/{env}/{service}/{key}
#   └── mount: secrets
#       └── path:  {env}/{service}/{key}
#                  e.g.  prod/postgres/password
#                        prod/skfence/cloudflare_dns_token
#                        staging/myapp/stripe_secret_key
#
# Vault setup (run once):
#
#   # 1. Enable the KV-v2 mount at path "secrets"
#   vault secrets enable -path=secrets kv-v2
#
#   # 2. Enable Kubernetes auth
#   vault auth enable kubernetes
#   vault write auth/kubernetes/config \
#     kubernetes_host="https://${KUBERNETES_PORT_443_TCP_ADDR}:443" \
#     kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
#     token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
#     issuer="https://kubernetes.default.svc.cluster.local"
#
#   # 3. Apply the ESO Vault policy (platform/kubernetes/external-secrets/vault-policy.hcl)
#   vault policy write eso-secrets-reader \
#     platform/kubernetes/external-secrets/vault-policy.hcl
#
#   # 4. Create the Kubernetes auth role for the ESO service account
#   vault write auth/kubernetes/role/skstacks-eso \
#     bound_service_account_names=external-secrets \
#     bound_service_account_namespaces=external-secrets \
#     token_policies="eso-secrets-reader" \
#     token_ttl=10m \
#     token_max_ttl=1h
#
# Apply:
#   kubectl apply -f platform/kubernetes/external-secrets/cluster-secret-store.yaml
#
# Verify:
#   kubectl get clustersecretstore vault-kv
#   kubectl describe clustersecretstore vault-kv   # check STATUS: Valid

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
  annotations:
    skstacks.io/backend: hashicorp-vault
    skstacks.io/kv-mount: secrets
    skstacks.io/path-convention: "secrets/{env}/{service}/{key}"
    # Corresponds to HashiCorpVaultBackend in secrets/hashicorp_vault/backend.py
    # with VAULT_MOUNT=secrets and VAULT_PATH_PREFIX="" (no prefix; env is first segment)
spec:
  provider:
    vault:
      server: "https://CHANGEME_VAULT_ADDR"   # e.g. https://vault.your-domain.com:8200

      # KV-v2 mount name. Full Vault path: secrets/data/{env}/{service}/{key}
      path: "secrets"
      version: "v2"

      # Uncomment for Vault Enterprise
      # namespace: "CHANGEME_VAULT_NAMESPACE"

      # TLS: leave caBundle empty to use system CAs (recommended with a proper cert).
      # For self-signed Vault TLS, base64-encode the CA cert:
      #   caBundle: "$(base64 -w0 /path/to/vault-ca.pem)"
      caBundle: ""

      auth:
        # Kubernetes JWT auth — ESO pod authenticates with its own service account token.
        # Vault validates the token against the K8s token review API.
        kubernetes:
          mountPath: "kubernetes"
          role: "skstacks-eso"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

      # Optional: forward client TLS cert to Vault
      # clientTLS:
      #   certSecretRef:
      #     name: vault-client-tls
      #     namespace: external-secrets
