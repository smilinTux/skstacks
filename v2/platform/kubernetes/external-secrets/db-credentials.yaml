# ExternalSecret — Database credentials (Postgres)
# coord task: 55d31c18
#
# Vault KV layout — grouped secret at secrets/{env}/postgres:
#
#   vault kv put secrets/prod/postgres \
#     host="db.internal.your-domain.com" \
#     port="5432" \
#     name="myapp_prod" \
#     username="myapp_user" \
#     password="CHANGEME_STRONG_PASSWORD"
#
# Path convention: secrets/{env}/{service}
#   All DB connection fields are properties of a single KV secret.
#   This avoids multiple Vault reads per sync cycle.
#
# Rotation:
#   1. Generate a new password and update the DB user:
#        psql -c "ALTER USER myapp_user PASSWORD 'NEW_PASSWORD';"
#   2. Update the Vault secret:
#        vault kv patch secrets/prod/postgres password="NEW_PASSWORD"
#   3. ESO re-syncs automatically within refreshInterval (1h).
#   4. Rolling-restart pods to pick up the new Secret:
#        kubectl rollout restart deployment/myapp -n CHANGEME_APP_NAMESPACE
#
# Apply:
#   # Edit CHANGEME_ placeholders first, then:
#   kubectl apply -f platform/kubernetes/external-secrets/db-credentials.yaml

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: CHANGEME_APP_NAMESPACE
  labels:
    app.kubernetes.io/managed-by: external-secrets
    skstacks.io/secret-scope: database
spec:
  # How often ESO reconciles this secret from Vault.
  # Set lower (e.g. 5m) if you need faster rotation propagation.
  refreshInterval: 1h

  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore

  target:
    name: postgres-credentials
    creationPolicy: Owner
    # Retain keeps the K8s Secret alive if the ExternalSecret is deleted.
    # Switch to Delete if you want secrets garbage-collected with the ExternalSecret.
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          app.kubernetes.io/managed-by: external-secrets
          skstacks.io/rotated-at: "{{ .rotatedAt | default \"unknown\" }}"

  # Each entry maps one KV property → one key in the resulting K8s Secret.
  # remoteRef.key    = path within the "secrets" KV mount (env/service)
  # remoteRef.property = field name inside that KV secret's JSON object
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: "CHANGEME_ENV/postgres"   # e.g. prod/postgres
        property: "host"

    - secretKey: DB_PORT
      remoteRef:
        key: "CHANGEME_ENV/postgres"
        property: "port"

    - secretKey: DB_NAME
      remoteRef:
        key: "CHANGEME_ENV/postgres"
        property: "name"

    - secretKey: DB_USER
      remoteRef:
        key: "CHANGEME_ENV/postgres"
        property: "username"

    - secretKey: DB_PASSWORD
      remoteRef:
        key: "CHANGEME_ENV/postgres"
        property: "password"

    # Derived convenience variable — full DSN assembled by ESO template engine.
    # Uncomment and adjust if your app consumes a DSN string directly.
    # - secretKey: DATABASE_URL
    #   remoteRef:
    #     key: "CHANGEME_ENV/postgres"
    #     property: "password"   # value unused; DSN is built in target.template below
