---
# SKStacks v2 — Forgejo Actions: Service Deploy Pipeline
#
# Trigger: push to main/develop, or manual workflow_dispatch
#
# This workflow:
#   1. Resolves secrets from the configured backend (vault-file recommended for Forgejo)
#   2. Renders Jinja2 templates with resolved secrets
#   3. Deploys to target platform (Docker Swarm, K8s, or RKE2)
#
# Required Forgejo repository secrets:
#   ANSIBLE_SSH_PRIVATE_KEY  — SSH key for node access
#   VAULT_PASS_PROD          — ansible-vault password (vault-file backend)
#   VAULT_ADDR               — HashiCorp Vault URL (hashicorp-vault backend)
#   VAULT_ROLE_ID            — AppRole role_id   (hashicorp-vault backend)
#   VAULT_SECRET_ID          — AppRole secret_id (hashicorp-vault backend)

name: Deploy Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "v2/core/**"
      - "v2/overlays/**"
      - ".forgejo/workflows/service-deploy.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (e.g. skfence, sksec)"
        required: true
      env:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod
      platform:
        description: "Target platform"
        required: true
        default: docker-swarm
        type: choice
        options:
          - docker-swarm
          - rke2
          - kubernetes
      secret_backend:
        description: "Secret backend"
        required: true
        default: vault-file
        type: choice
        options:
          - vault-file
          - hashicorp-vault
          - capauth

jobs:
  validate:
    name: Validate & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          pip install ansible-lint ansible-core
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin/

      - name: Lint Ansible playbooks
        run: ansible-lint v2/platform/${{ inputs.platform }}/ansible/

      - name: Validate K8s manifests (K8s/RKE2 only)
        if: inputs.platform != 'docker-swarm'
        run: |
          kubeconform -strict -summary v2/platform/${{ inputs.platform }}/manifests/

  deploy:
    name: Deploy ${{ inputs.service }} → ${{ inputs.env }} (${{ inputs.platform }})
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.env }}     # Requires environment approval for prod
    concurrency:
      group: deploy-${{ inputs.service }}-${{ inputs.env }}
      cancel-in-progress: false         # Never cancel in-flight deploys

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint hvac python-gnupg pyyaml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── vault-file backend ────────────────────────────────────────────────
      - name: Configure vault-file password
        if: inputs.secret_backend == 'vault-file'
        run: |
          mkdir -p ~/.vault_pass_env
          echo "${{ secrets.VAULT_PASS_PROD }}" > ~/.vault_pass_env/.${{ inputs.env }}_vault_pass
          chmod 600 ~/.vault_pass_env/.${{ inputs.env }}_vault_pass

      # ── hashicorp-vault backend ───────────────────────────────────────────
      - name: Configure HashiCorp Vault credentials
        if: inputs.secret_backend == 'hashicorp-vault'
        run: |
          echo "VAULT_ADDR=${{ secrets.VAULT_ADDR }}" >> $GITHUB_ENV
          echo "VAULT_ROLE_ID=${{ secrets.VAULT_ROLE_ID }}" >> $GITHUB_ENV
          echo "VAULT_SECRET_ID=${{ secrets.VAULT_SECRET_ID }}" >> $GITHUB_ENV

      # ── Deploy: Docker Swarm ──────────────────────────────────────────────
      - name: Deploy (Docker Swarm)
        if: inputs.platform == 'docker-swarm'
        env:
          SKSTACKS_SECRET_BACKEND: ${{ inputs.secret_backend }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i v2/platform/docker-swarm/inventory.yml \
            -e env=${{ inputs.env }} \
            -e service=${{ inputs.service }} \
            -e secret_backend=${{ inputs.secret_backend }} \
            v2/core/${{ inputs.service }}/deploy.yml

      # ── Deploy: RKE2 / K8s (via kubectl + ArgoCD sync) ───────────────────
      - name: Configure kubeconfig
        if: inputs.platform != 'docker-swarm'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy (RKE2/K8s — Kustomize)
        if: inputs.platform != 'docker-swarm'
        run: |
          kubectl apply -k v2/overlays/${{ inputs.env }}/

      - name: Trigger ArgoCD sync
        if: inputs.platform != 'docker-swarm'
        run: |
          argocd app sync ${{ inputs.service }}-${{ inputs.env }} \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --timeout 120

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ inputs.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | ${{ inputs.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Backend | ${{ inputs.secret_backend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
