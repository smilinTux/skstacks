---
# SKStacks v2 — Forgejo Actions: Container Image Build & Sign
#
# Builds, scans, signs (Cosign), and pushes container images to the
# private registry (SKReg / self-hosted Forgejo registry).
#
# Required repository secrets:
#   REGISTRY_USER     — registry username
#   REGISTRY_PASSWORD — registry password or token
#   COSIGN_KEY        — Cosign private key (base64)
#   COSIGN_PASSWORD   — Cosign key password

name: Build & Push Image

on:
  push:
    tags:
      - "v*"
    paths:
      - "v2/core/**/Dockerfile"
      - "v2/core/**/Containerfile"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build"
        required: true
      tag:
        description: "Image tag (default: git tag)"
        required: false

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [skfence, sksec, sksso, skbackup]
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SERVICE="${{ matrix.service }}"
          TAG="${{ inputs.tag || github.ref_name }}"
          REGISTRY="${{ secrets.REGISTRY_HOST }}"
          IMAGE="${REGISTRY}/skstacks/${SERVICE}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${IMAGE}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: v2/core/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.meta.outputs.full }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:cache,mode=max
          provenance: true
          sbom: true    # Generate Software Bill of Materials

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # Fail on CRITICAL/HIGH CVEs

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_KEY \
            "${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify --key cosign.pub \
            "${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}"
