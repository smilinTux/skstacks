# capauth.yaml — CapAuth/PGP recipient configuration
#
# Controls which PGP keys can decrypt secrets for each environment.
# Place this file at: ~/.skstacks/capauth.yaml
#
# Generate a key pair if you don't have one:
#   gpg --full-generate-key
#   gpg --list-keys --keyid-format LONG
#
# To use skcapstone agent identity (recommended):
#   skcapstone soul_show  ← displays the agent's PGP fingerprint

# Default recipients applied when an env-specific section is missing
default:
  recipients:
    - fingerprint: "CHANGEME_YOUR_PGP_FINGERPRINT_HERE"
      label: "primary-operator"

# Production — most restricted
prod:
  recipients:
    - fingerprint: "CHANGEME_PROD_OPERATOR_PGP_FINGERPRINT"
      label: "prod-operator"
    - fingerprint: "CHANGEME_AGENT_OPUS_PGP_FINGERPRINT"
      label: "opus-agent"
    # Add additional authorized operators / agents here

# Staging — typically same operator, may add staging-only agents
staging:
  recipients:
    - fingerprint: "CHANGEME_YOUR_PGP_FINGERPRINT_HERE"
      label: "operator"
    - fingerprint: "CHANGEME_AGENT_OPUS_PGP_FINGERPRINT"
      label: "opus-agent"

# Development — most permissive, can include dev-only keys
dev:
  recipients:
    - fingerprint: "CHANGEME_YOUR_PGP_FINGERPRINT_HERE"
      label: "operator"
    - fingerprint: "CHANGEME_AGENT_OPUS_PGP_FINGERPRINT"
      label: "opus-agent"

# ── Notes ────────────────────────────────────────────────────────────────────
#
# When you add or remove a recipient, you MUST re-encrypt all existing blobs:
#
#   python3 secrets/capauth/reencrypt.py --env prod
#
# This reads each blob, decrypts with any existing key, and re-encrypts to
# the new recipient list.
#
# Fingerprint format: 40-character hex string (no spaces).
# You can use the last 16 characters (short key ID) but full fingerprints
# are recommended to prevent key confusion attacks.
