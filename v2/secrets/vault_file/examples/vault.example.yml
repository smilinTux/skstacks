# SKStacks v2 — vault-file example
#
# This is a SANITIZED template. Replace all CHANGEME_* values with real ones,
# then encrypt with:
#   ansible-vault encrypt --vault-password-file ~/.vault_pass_env/.prod_vault_pass \
#     --output group_vars/prod/skfence-prod_vault.yml vault.example.yml
#
# Variable naming convention:
#   vault_{scope}_{key}: value
#
# ── SKFence (Traefik) ──────────────────────────────────────────────────────

vault_skfence_cloudflare_dns_token: "CHANGEME_CF_DNS_API_TOKEN"
vault_skfence_cloudflare_global_api_key: "CHANGEME_CF_GLOBAL_API_KEY"
vault_skfence_cloudflare_email: "admin@your-domain.com"
vault_skfence_dashboard_user: "admin"
vault_skfence_dashboard_password_hash: "CHANGEME_BCRYPT_HASH"

# ── SKSec (CrowdSec) ───────────────────────────────────────────────────────

vault_sksec_bouncer_api_key: "CHANGEME_CROWDSEC_BOUNCER_KEY"
vault_sksec_crowdsec_enrollment_key: "CHANGEME_CROWDSEC_ENROLLMENT_KEY"

# ── SKSSO (Authentik) ──────────────────────────────────────────────────────

vault_sksso_secret_key: "CHANGEME_AUTHENTIK_SECRET_KEY"
vault_sksso_db_password: "CHANGEME_DB_PASS_STRONG"
vault_sksso_redis_password: "CHANGEME_REDIS_PASS"
vault_sksso_bootstrap_email: "admin@your-domain.com"
vault_sksso_bootstrap_password: "CHANGEME_AUTHENTIK_BOOTSTRAP_PASS"

# ── SKBackup (Duplicati) ───────────────────────────────────────────────────

vault_skbackup_encryption_passphrase: "CHANGEME_BACKUP_PASSPHRASE_STRONG"
vault_skbackup_s3_access_key: "CHANGEME_S3_ACCESS_KEY"
vault_skbackup_s3_secret_key: "CHANGEME_S3_SECRET_KEY"
vault_skbackup_smtp_password: "CHANGEME_SMTP_PASS"

# ── SKHA (Keepalived) ──────────────────────────────────────────────────────

vault_skha_vrrp_password: "CHANGEME_VRRP_PASS"  # max 8 chars

# ── SSH Keys (generated by deploy pipeline) ───────────────────────────────

vault_ansible_private_key: |
  CHANGEME_PASTE_PRIVATE_KEY_HERE
vault_ansible_public_key: "CHANGEME_PASTE_PUBLIC_KEY_HERE"
