# HashiCorp Vault — Helm values for RKE2 / K8s HA deployment
#
# Install:
#   helm repo add hashicorp https://helm.releases.hashicorp.com
#   helm install vault hashicorp/vault \
#     -n vault --create-namespace \
#     -f vault-values.yaml
#
# Initialize after install:
#   kubectl exec -n vault vault-0 -- vault operator init \
#     -key-shares=5 -key-threshold=3 \
#     -format=json > vault-init.json
#   # Store vault-init.json in a SECURE offline location!
#
#   # Unseal (run for each of the 3 threshold keys):
#   kubectl exec -n vault vault-0 -- vault operator unseal <unseal-key>

global:
  enabled: true
  tlsDisable: false   # NEVER disable TLS in production

injector:
  enabled: true       # Vault Agent sidecar injector
  replicas: 2
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

server:
  # Integrated Raft storage (recommended for RKE2 — no external etcd needed)
  ha:
    enabled: true
    replicas: 3         # Must be odd: 3 or 5
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 0
          address     = "[::]:8200"
          tls_cert_file = "/vault/userconfig/vault-ha-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-ha-tls/tls.key"
          # Enable audit log (required for compliance)
          telemetry {
            unauthenticated_metrics_access = "false"
          }
        }

        storage "raft" {
          path    = "/vault/data"
          node_id = "{{ env "VAULT_RAFT_NODE_ID" }}"

          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-ha-tls/ca.crt"
          }
          retry_join {
            leader_api_addr = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-ha-tls/ca.crt"
          }
          retry_join {
            leader_api_addr = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-ha-tls/ca.crt"
          }

          autopilot {
            cleanup_dead_servers      = "true"
            last_contact_threshold    = "200ms"
            last_contact_failure_threshold = "10m"
            max_trailing_logs         = 250000
            min_quorum                = 3
            server_stabilization_time = "10s"
          }
        }

        service_registration "kubernetes" {}

        seal "awskms" {  # Remove or change to "transit" for auto-unseal via another Vault
          disabled = "true"
        }

        log_level = "info"

  # TLS — use cert-manager to issue certs, or provide manually
  # Create Secret "vault-ha-tls" with tls.crt, tls.key, ca.crt before install
  volumes:
    - name: userconfig-vault-ha-tls
      secret:
        defaultMode: 420
        secretName: vault-ha-tls
  volumeMounts:
    - mountPath: /vault/userconfig/vault-ha-tls
      name: userconfig-vault-ha-tls
      readOnly: true

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: longhorn   # Use Longhorn on RKE2 bare-metal

  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: longhorn

  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              app.kubernetes.io/instance: "{{ .Release.Name }}"
              component: server
          topologyKey: kubernetes.io/hostname

ui:
  enabled: true
  serviceType: ClusterIP  # Expose via ingress-nginx, not directly
  serviceNodePort: null
